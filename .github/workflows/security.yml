name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: latest }
      - run: uv python install 3.12
      - run: uv sync --all-packages
      - name: Run Bandit
        run: uv run bandit -r apps packages -ll -x apps/api/tests,ml/benchmarks

  semgrep:
    name: Semgrep OWASP
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep ci --config p/owasp-top-ten --config p/python
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: latest }
      - run: uv python install 3.12
      - run: uv sync --all-packages
      - name: Audit Python deps
        run: uv run pip-audit --require-hashes=false --fix=false

  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Audit JS deps
        run: pnpm audit --audit-level high

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  trivy:
    name: Trivy container scan
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
    # Build the API image (the most attack-surface-heavy service) and scan it.
    # Fails on CRITICAL CVEs; HIGH CVEs are reported but do not block.
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t drishtiai-api:scan apps/api
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: drishtiai-api:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  license-check:
    name: License check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: latest }
      - run: uv python install 3.12
      - run: uv sync --all-packages
      - name: Check licenses
        run: make licenses
