name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + typecheck ────────────────────────────────────────────────
  python-lint:
    name: Python lint + typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy apps packages --ignore-missing-imports

  # ── Python: unit tests ──────────────────────────────────────────────────────
  python-test:
    name: Python unit tests
    runs-on: ubuntu-24.04
    needs: python-lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run pytest
        run: uv run pytest --tb=short -q

  # ── JS/TS: lint + typecheck ─────────────────────────────────────────────────
  js-lint:
    name: JS/TS lint + typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --recursive lint

      - name: Typecheck
        run: pnpm --recursive typecheck

  # ── JS/TS: tests ────────────────────────────────────────────────────────────
  js-test:
    name: JS/TS tests
    runs-on: ubuntu-24.04
    needs: js-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --recursive test

  # ── Docker image builds ─────────────────────────────────────────────────────
  docker-build:
    name: Docker builds
    runs-on: ubuntu-24.04
    needs: [python-test, js-test]
    strategy:
      matrix:
        service:
          - { name: api, dockerfile: apps/api/Dockerfile }
          - { name: admin, dockerfile: apps/admin/Dockerfile }
          - { name: worker, dockerfile: apps/worker/Dockerfile }
          - { name: pipeline, dockerfile: apps/pipeline/Dockerfile }
          - { name: web, dockerfile: apps/web/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: drishtiai-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
