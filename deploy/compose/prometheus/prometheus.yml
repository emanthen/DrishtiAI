global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "drishtiai-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "drishtiai-pipeline"
    static_configs:
      - targets: ["pipeline:9100"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
