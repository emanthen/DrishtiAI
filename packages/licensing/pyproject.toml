[project]
name = "drishtiai-licensing"
version = "1.0.0"
description = "DrishtiAI hardware-locked license enforcement"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=42.0.0",
    "click>=8.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.2",
    "freezegun>=1.5.0",
]

[project.scripts]
drishti-license = "drishtiai_licensing.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/drishtiai_licensing"]
