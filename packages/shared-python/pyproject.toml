[project]
name = "drishtiai-shared"
version = "0.0.0"
description = "DrishtiAI shared Python models, schemas, and DB access"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0.31",
    "alembic>=1.13.2",
    "pydantic>=2.8.0",
    "psycopg[binary]>=3.2.1",
    "geoalchemy2>=0.15.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.2",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/drishtiai_shared"]
